spring:
  application:
    name: user

  datasource:
    url: jdbc:postgresql://localhost:5432/hotel-infra
    username: postgres
    password: admin123
  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true


#eureka client setup
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true
    fetch-registry: true

  instance:
    hostname: localhost
    instance-id: localhost:${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90


server:
  port: 8081